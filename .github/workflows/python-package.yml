name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # We target 3.10 and 3.11 to avoid compatibility issues with modern AI libraries
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v7
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest
        # Install requirements if they exist
        if [ -f backend/requirements.txt ]; then 
            pip install -r backend/requirements.txt
        fi
        
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Test with pytest
      env:
        PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/backend
      run: |
        # Use importlib mode to resolve module paths correctly
        pytest --import-mode=importlib backend/
